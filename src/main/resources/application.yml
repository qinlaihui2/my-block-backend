server:
  port: 8080

# 跨域来源：本地开发 + 已部署前端（可按需增删）
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://qinlaihuie2.xyz

# MySQL：本地可装 MySQL 后使用默认；Railway 关联数据库后会注入 MYSQLHOST、MYSQLPORT 等
# 也可在 Railway 中设置 SPRING_DATASOURCE_URL / USERNAME / PASSWORD 覆盖整段连接
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQLDATABASE:myblog}?allowPublicKeyRetrieval=true&serverTimezone=UTC&sslMode=PREFERRED&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# 生产环境请设置环境变量 JWT_SECRET（Base64，长度足够）
jwt:
  secret: ${JWT_SECRET:bXktYmxvZy1kZXYtanV0LXNlY3JldC1rZXktc2hvdWxkLWJlLXJlcGxhY2VkLWFzYXA=}
  expiration-ms: 86400000
