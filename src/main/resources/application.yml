server:
  port: 8080

# 跨域来源：本地开发 + 已部署前端（可按需增删）
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://qinlaihuie2.xyz

spring:
  datasource:
    url: jdbc:h2:mem:myblog;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

